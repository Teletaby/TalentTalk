# Netlify Configuration for TalentTalk

[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[env]
  [env.production]
    [env.production.context]
      environment = { VITE_GROQ_API_KEY = "", DEEPGRAM_API_KEY = "" }

# Allow VITE_GROQ_API_KEY and DEEPGRAM_API_KEY in builds
[context.production.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_GROQ_API_KEY,DEEPGRAM_API_KEY"

# Redirect all API calls to netlify functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA (Single Page App) rewrite rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
